<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airzone Web</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <main class="app">
    
  <header>
    <button id="modeButton" class="app-header mode-cold" type="button">
      <span id="modeIcon" class="mode-icon">❄️</span>
      <span class="header-text">
        <strong id="modeText">Modo frío</strong>
        <small>Control básico de zonas</small>
      </span>
    </button>
  </header>

    <section class="card">
      <label for="zoneSelect">Zona seleccionada</label>
      <select id="zoneSelect">
        <option>Cargando zonas...</option>
      </select>
    </section>

<section class="card zone-card">
  <div class="zone-heading">
    <h2 id="zoneName">Zona</h2>
    <span id="zoneStatus" class="status-pill">---</span>
  </div>

  <div class="main-temperature">
    <span class="label">Temperatura actual</span>
    <strong id="roomTemp">---</strong>
  </div>

  <div class="setpoint-block">
    <span class="label">Consigna</span>
    <strong id="setpoint">---</strong>
  </div>

  <div class="demand-block">
    <span>Demanda</span>
    <strong id="demand">---</strong>
  </div>

<div class="secondary-info">
  <div class="secondary-item" title="Humedad">
    <span class="secondary-icon">💧</span>
    <strong id="humidity">---</strong>
  </div>

  <div class="secondary-item" title="Batería">
    <span class="secondary-icon">🔋</span>
    <strong id="battery">---</strong>
  </div>

  <div class="secondary-item" title="Cobertura">
    <span class="secondary-icon">📶</span>
    <strong id="coverage">---</strong>
  </div>
</div>
</section>

    <section class="card controls-card">
      <button id="toggleButton" class="main-button">
        Encender / apagar zona
      </button>

      <div class="temperature-controls">
        <button id="decreaseButton" class="secondary-button">
          -0.5 ºC
        </button>

        <button id="increaseButton" class="secondary-button">
          +0.5 ºC
        </button>
      </div>
    </section>

    <section class="message-card">
      <p id="message"></p>
    </section>
  </main>
</body>
</html>
